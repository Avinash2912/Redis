services:
  redis:
    image: redis:7-alpine
    container_name: redis_tutorial
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:7.0
    container_name: mongodb_tutorial
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: redis_tutorial
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data: